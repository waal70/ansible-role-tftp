---
# We assume the secrets-repo contains a master.secret that was generated with:
# openssl rand -hex 32 > master.secret   # 256‑bit, 64‑char hex string
# chmod 400 master.secret                # protect it before building the initramfs

- name: Create temporary build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: build
  register: tmp_dir

- name: Create the buildroot
  ansible.builtin.file:
    state: directory
    path: "{{ tmp_dir.path }}/custom-secrets"
    mode: "0744"

- name: Set the new root-folder
  ansible.builtin.set_fact:
    buildroot: "{{ tmp_dir.path }}/custom-secrets"

- name: Create the additional folders
  ansible.builtin.file:
    state: directory
    path: "{{ buildroot }}/{{ item }}"
    mode: "0744"
  with_items:
    - "ansible"

# - name: Create a (dummy) conf file in the conf-folder
#   ansible.builtin.file:
#     path: "{{ buildroot }}/conf/initrd.conf"
#     state: touch
#     mode: "0644"

- name: "Read the secrets file, skipping if none found"
  ansible.builtin.set_fact:
    secret: "{{ lookup('file', item) }}"
  with_first_found:
    files:
      - "{{ private_repo }}/ansible-vault/.master_secret"
    skip: true

- name: Place the secret-file in the files-folder
  ansible.builtin.copy:
    content: "{{ secret }}"
    dest: "{{ buildroot }}/ansible/master-secret"
    mode: "0400"
  when: secret is defined

- name: Repack the secrets files into a new custom-secrets.cpio.gz
  ansible.builtin.command: >
    bash -c 'cd {{ buildroot }} && find . | cpio -ov -H newc | gzip -c > ../custom-secrets.cpio.gz'
  args:
    chdir: "{{ buildroot }}"
    creates: "{{ tmp_dir.path }}/custom-secrets.cpio.gz"
  become: true
  become_user: root

- name: Move the custom-secrets.cpio.gz to the tftp folder
  ansible.builtin.copy:
    src: "{{ tmp_dir.path }}/custom-secrets.cpio.gz"
    remote_src: true
    dest: "/srv/tftp/debian-installer/amd64/custom-secrets.cpio.gz"
    mode: "0644"
    owner: root
    force: true
  become: true
  become_user: root

- name: Update the initrd.gz with the new custom-secrets.cpio.gz
  ansible.builtin.command: >
    bash -c 'cd /srv/tftp/debian-installer/amd64/ && cat initrd.gz custom-secrets.cpio.gz > initrd.gz.new'
  args:
    chdir: /srv/tftp/debian-installer/amd64/
    creates: /srv/tftp/debian-installer/amd64/initrd.gz.new
  become: true
  become_user: root

- name: Remove the old initrd.gz
  ansible.builtin.file:
    path: /srv/tftp/debian-installer/amd64/initrd.gz
    state: absent
  become: true
  become_user: root

- name: Move the new initrd.gz into place
  ansible.builtin.command: >
    mv /srv/tftp/debian-installer/amd64/initrd.gz.new /srv/tftp/debian-installer/amd64/initrd.gz
  args:
    creates: /srv/tftp/debian-installer/amd64/initrd.gz
  become: true
  become_user: root

- name: Clean up your temporary folders
  ansible.builtin.file:
    path: "{{ tmp_dir.path }}"
    state: absent
    force: true
